# sam-os: personal OS MCP server
#
# This compose file is mainly for building the image and running the server
# in attached stdio mode. Because MCP stdio expects a persistent stdin/stdout
# pipe, Hermes normally launches the server directly:
#
#   /home/server/sam-os/.venv/bin/python -m samos.server
#
# For containerized stdio, run interactively:
#
#   docker compose -f docker/docker-compose.yml --env-file .env run --rm sam-os
#
# Or with plain docker:
#
#   docker run -i --rm --env-file .env -v ${SAMOS_DB_HOST_PATH}:/data sam-os

services:
  sam-os:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: sam-os:dev
    container_name: sam-os
    stdin_open: true
    tty: true
    environment:
      SAMOS_DB_PATH: /data/schedule.db
      TZ: ${TZ:-America/Toronto}
      PYTHONIOENCODING: utf-8
    volumes:
      - ${SAMOS_DB_HOST_PATH:-/home/server/data}:/data:rw
    dns:
      - 1.1.1.1
      - 8.8.8.8
    mem_limit: 256m
